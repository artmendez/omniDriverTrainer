<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnidrive Trainer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111116;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
       }
        /* Top Center HUD Container */
        #hud-top {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
            user-select: none;
            pointer-events: none;
        }
        .hud-card {
            background: rgba(0, 0, 0, 0.85);
            color: #ffffff;
            border: 2px solid #2196F3;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px 18px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            height: 52px;
            box-sizing: border-box;
        }
        #score-box {
            font-size: 20px;
            color: #4CAF50;
            border-color: #4CAF50;
            min-width: 120px;
        }

        /* Cycles lefft: Six Bar Indicator (Left of Timer) */
        #bars-box {
            display: flex;
            gap: 5px;
            padding: 6px 12px;
            align-items: center;
            justify-content: center;
            border-color: #00E5FF;
        }
        .bar {
            width: 8px;
            height: 26px;
            background-color: #00E5FF;
            border-radius: 2px;
            box-shadow: 0 0 8px #00E5FF;
            transition: background-color 0.25s, box-shadow 0.25s, opacity 0.25s;
        }
        .bar.lost {
            background-color: #333344;
            box-shadow: none;
            opacity: 0.3;
        }

        #timer-box {
            font-size: 26px;
            letter-spacing: 1px;
        }
        #dial-container {
            width: 52px;
            height: 52px;
            padding: 0;
            overflow: hidden;
        }
        #cannon-box {
            font-size: 20px;
            color: #ffeb3b;
            border-color: #ffeb3b;
            min-width: 90px;
        }
        #ui-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #ffffff;
            background: rgba(0, 0, 0, 0.8);
            padding: 14px 20px;
            border-radius: 8px;
            pointer-events: none;
            user-select: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }
        #ui-overlay h1 {
            margin: 0 0 8px 0;
            font-size: 18px;
        }
        #ui-overlay p {
            margin: 4px 0;
            font-size: 13px;
            color: #ccc;
        }
        #fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 18px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            z-index: 10;
        }
        #fullscreen-btn:hover {
            background-color: #0b7dda;
        }

        /* Countdown & Start Prompts */
        #start-prompt {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #ffffff;
            border: 2px solid #2196F3;
            padding: 24px 48px;
            border-radius: 12px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 0 25px rgba(33, 150, 243, 0.6);
            text-align: center;
            user-select: none;
        }
        #start-prompt:hover {
            background: rgba(10, 25, 50, 0.95);
            border-color: #00E5FF;
        }
        #countdown-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 140px;
            font-weight: 900;
            color: #ffeb3b;
            text-shadow: 0 0 20px rgba(255, 235, 59, 0.9), 0 0 40px rgba(0,0,0,0.9);
            z-index: 100;
            pointer-events: none;
            display: none;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        /* Game Over Overlay */
        #gameover-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 0, 0, 0.92);
            color: #ffffff;
            border: 3px solid #FF2A2A;
            padding: 32px 54px;
            border-radius: 14px;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            z-index: 110;
            display: none;
            box-shadow: 0 0 35px rgba(255, 42, 42, 0.7);
            user-select: none;
        }
        #gameover-overlay h1 {
            font-size: 42px;
            color: #FF2A2A;
            margin: 0 0 10px 0;
            text-shadow: 0 0 12px #FF2A2A;
        }
        #gameover-overlay p {
            font-size: 22px;
            margin: 10px 0 24px 0;
            color: #dddddd;
        }
        #restart-btn {
            padding: 12px 28px;
            background-color: #FF2A2A;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(255, 42, 42, 0.5);
            font-family: inherit;
        }
        #restart-btn:hover {
            background-color: #d60000;
        }
    </style>

    <!-- Uses Three.js Engine & GLTF Loader. Browsers block loading external files, so this must be run from a server -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <!-- Start Prompt, Countdown & Game Over Overlays -->
    <div id="start-prompt" onclick="startSequence()">CLICK TO START</div>
    <div id="countdown-overlay">3</div>

    <div id="gameover-overlay">
        <h1>GAME OVER</h1>
        <p>FINAL SCORE: <span id="final-score">0</span></p>
        <button id="restart-btn" onclick="restartGame()">PLAY AGAIN</button>
    </div>

    <!-- This is the Top HUD: Score, 6-Bar Indicator, Timer, Vehicle Orientation Dial & Cannon Angle -->
    <div id="hud-top">
        <div id="score-box" class="hud-card">PTS: <span id="score-text">0</span></div>
        <div id="bars-box" class="hud-card">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <div id="timer-box" class="hud-card"><span id="timer-text">10.0</span>s</div>
        <div id="dial-container" class="hud-card">
            <canvas id="dial-canvas" width="52" height="52"></canvas>
        </div>
        <div id="cannon-box" class="hud-card">
            <span id="cannon-text">0.0°</span>
        </div>
    </div>

    <div id="ui-overlay">
        <h1>OmniDriver Trainer</h1>
        <p><strong>POV Controls:</strong> <kbd>CTRL</kbd> + <kbd>1</kbd> / <kbd>2</kbd> / <kbd>3</kbd></p>
        <p><strong>Drive Vehicle:</strong> <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd></p>
        <p><strong>Rotate Vehicle:</strong> <kbd>J</kbd> (Left) | <kbd>L</kbd> (Right)</p>
        <p><strong>Cannon Pitch:</strong> <kbd>I</kbd> (Elevate) | <kbd>K</kbd> (Depress)</p>
        <p><strong>Fire Cannon:</strong> <kbd>Spacebar</kbd></p>
        <p><strong>Active View:</strong> <span id="current-view" style="color:#2196F3;">1/2 (Center)</span></p>
    </div>

    <button id="fullscreen-btn" onclick="toggleFullScreen()">Toggle Full Screen</button>
    <div id="canvas-container"></div>

    <script>
        // GENERAL GAME PARAMETERS. May be modified for different difficulty levels or vehicle sizes.
        // --- DIMENSIONS & CONSTANTS (distance values are aproximately in meters)---
        const LENGTH = 14.0;          // Inner floor length (Z-axis)
        const WIDTH = 9.5;            // Inner floor width (X-axis)
        const WALL_HEIGHT = 0.6;      // Wall height
        const WALL_THICKNESS = 0.075; // Outward wall thickness
        const EYE_HEIGHT = 1.65;       // Camera POV height

        // some scaling was needed
        const MIN_FOOTPRINT = WIDTH * 0.10; // 0.95m
        const MAX_FOOTPRINT = WIDTH * 0.30; // 2.85m

        let scene, camera, renderer;
        let activeObstacles = [];
        let activeExplosions = [];     // Particle explosion instances array
        let vehicleMesh = null;
        let vehicleRadius = 0.45;     // Dynamic bounding radius (updated on GLTF load)
        let vehicleScaleFactor = 1.0;
        
        // --- GAME STATE VARIABLES ---
        let score = 0;
        let remainingBars = 6;
        let gameActive = false;        // Driving & timer paused during countdown
        let isGameOver = false;
        let sequenceStarted = false;

        // AUDIO SYSTEM (Procedural Web Audio API). Makes kinda retrogame sounds, but saves work.
        // No external files needed, and it's fun to play with waveforms, frequencies, and envelopes. All sounds are generated in real-time. :)
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playCountdownSound(isGo = false) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = isGo ? 'triangle' : 'sine';
            const freq = isGo ? 880 : 440;
            osc.frequency.setValueAtTime(freq, now);

            if (isGo) {
                osc.frequency.exponentialRampToValueAtTime(1320, now + 0.25);
                gain.gain.setValueAtTime(0.6, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 0.45);
            } else {
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 0.2);
            }
        }

        function playBarLostSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(320, now);
            osc.frequency.exponentialRampToValueAtTime(70, now + 0.35);

            gain.gain.setValueAtTime(0.5, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.35);
        }

        function playCannonSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;

            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.exponentialRampToValueAtTime(35, now + 0.22);

            oscGain.gain.setValueAtTime(0.8, now);
            oscGain.gain.exponentialRampToValueAtTime(0.01, now + 0.22);

            osc.connect(oscGain);
            oscGain.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.22);

            const bufferSize = audioCtx.sampleRate * 0.18;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1200, now);
            filter.frequency.exponentialRampToValueAtTime(150, now + 0.18);

            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.7, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.18);

            noise.connect(filter);
            filter.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            noise.start(now);
        }

        function playExplosionSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;

            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(130, now);
            osc.frequency.exponentialRampToValueAtTime(20, now + 0.55);

            oscGain.gain.setValueAtTime(1.0, now);
            oscGain.gain.exponentialRampToValueAtTime(0.01, now + 0.55);

            osc.connect(oscGain);
            oscGain.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.55);

            const bufferSize = audioCtx.sampleRate * 0.6;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(800, now);
            filter.frequency.exponentialRampToValueAtTime(60, now + 0.6);

            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.9, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);

            noise.connect(filter);
            filter.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            noise.start(now);
        }

        function playScoreSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;

            const freqs = [523.25, 659.25, 783.99];
            freqs.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now + i * 0.05);

                gain.gain.setValueAtTime(0.25, now + i * 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.05 + 0.15);

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start(now + i * 0.05);
                osc.stop(now + i * 0.05 + 0.15);
            });
        }

        // VEHICLE CONTROL VARIABLES... handle with care. They will affect the difficulty of the game and vehicle responsiveness.
        const MAX_SPEED = 2.0;        // Max speed (2 m/s)
        const ACCELERATION = 2.0;     // Acceleration/Deceleration rate (2 m/s²)
        const ROTATION_SPEED = 2.0;   // Rotation speed (2.0 rad/s)
        
        let vx = 0.0;                 // Velocity X
        let vz = 0.0;                 // Velocity Z

        // CANNON & PROJECTILE VARIABLES --- This affects how the cannon shoots the dart.
        const CANNON_SPEED = 2.5;                // Angular speed (2.5 rad/s)
        const MIN_CANNON_ANGLE = 0.0;            // 0 degrees
        const MAX_CANNON_ANGLE = Math.PI / 3;    // 60 degrees (in radians)
        const LAUNCH_SPEED = 7.0;                // Muzzle velocity (7.0 m/s)

        // Gravity constant for projectile motion calculations. This is used to simulate the effect of gravity on the projectile after it is fired from the cannon.
        // You may want to adjust it to simulate different gravitational environments or to make the game easier/harder.
        // Want ideas? (Moon: 1.62 m/s², Mars: 3.71 m/s², Jupiter: 24.79 m/s²)
        // Set GRAVITY=0 to make the dart like a laser beam.
        const GRAVITY = 9.81;                    // Earth gravity acceleration (9.81 m/s²)

        let cannonPivot = null;
        let cannonMesh = null;
        let cannonAngle = 0.0;
        let activeProjectile = null;

        // Key states
        const keys = {
            w: false, s: false, a: false, d: false,
            j: false, l: false,
            i: false, k: false
        };

        // Timer Variables. You may adjust timerSeconds to give more time to complete a target set.
        let timerSeconds = 10.0;
        let lastTime = performance.now();

        // Camera position right behind south wall
        const STEPBACK_DISTANCE = 1.0; // How far back is the viewer standing behind the south wall.
        // FRC drivers typically stand 0.75 to 1.0 meters behind the wall, so this is a reasonable distance for a training scenario.
        const cameraZ = -(LENGTH / 2) - WALL_THICKNESS - STEPBACK_DISTANCE; 
        // This predefines POV positions (station 1, station 2, station 3) along the south wall. The user can switch between these positions using CTRL+1, CTRL+2, and CTRL+3.
        const povPositions = {
            1: { x: -WIDTH/2 + (WIDTH * (1/3)), y: EYE_HEIGHT, z: cameraZ, name: "1/3 Position" },
            2: { x: -WIDTH/2 + (WIDTH * (1/2)), y: EYE_HEIGHT, z: cameraZ, name: "1/2 Position (Center)" },
            3: { x: -WIDTH/2 + (WIDTH * (2/3)), y: EYE_HEIGHT, z: cameraZ, name: "2/3 Position" }
        };

        init();
        animate();

        // Gets the whole thing ready...
        function init() {
            // 1. Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a24);

            // 2. Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 100);

            // 3. Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            setPOV(2); // Initial POV (Center)

            // 4. Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
            sunLight.position.set(5, 15, -5);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            scene.add(sunLight);

            const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
            fillLight.position.set(-5, 10, 10);
            scene.add(fillLight);

            // 5. Build Environment & Load Vehicle FIRST
            createFloor();
            createPerimeterWalls();
            loadVehicleModel();
            updateBarsHUD();

            // 6. Event Listeners
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('keyup', onKeyUp);
            window.addEventListener('pointerdown', initAudio);
        }

        // --- BARS HUD UPDATE --- The BARS are the cycles or lives left. A bar will run out with a timer.
        function updateBarsHUD() {
            const barElems = document.querySelectorAll('#bars-box .bar');
            barElems.forEach((bar, index) => {
                if (index < remainingBars) {
                    bar.classList.remove('lost');
                } else {
                    bar.classList.add('lost');
                }
            });
        }

        // START COUNTDOWN SEQUENCE 
        function startSequence() {
            initAudio();
            if (sequenceStarted) return;
            sequenceStarted = true;

            const promptElem = document.getElementById('start-prompt');
            if (promptElem) promptElem.style.display = 'none';

            const countOverlay = document.getElementById('countdown-overlay');
            countOverlay.style.display = 'block';

            let count = 3;
            countOverlay.innerText = count;
            countOverlay.style.color = '#ffeb3b';
            playCountdownSound(false);

            const countInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countOverlay.innerText = count;
                    playCountdownSound(false);
                } else if (count === 0) {
                    countOverlay.innerText = "GO!";
                    countOverlay.style.color = '#4CAF50';
                    playCountdownSound(true);

                    spawnObstacles();
                    gameActive = true;
                } else {
                    clearInterval(countInterval);
                    countOverlay.style.display = 'none';
                }
            }, 1000);
        }

        // RESTART GAME
        function restartGame() {
            const goElem = document.getElementById('gameover-overlay');
            if (goElem) goElem.style.display = 'none';

            score = 0;
            addScore(0);
            remainingBars = 6;
            updateBarsHUD();
            timerSeconds = 10.0;
            isGameOver = false;
            sequenceStarted = false;
            vx = 0;
            vz = 0;

            // This will reset Vehicle Position to South Wall Center
            if (vehicleMesh) {
                const initialZ = -(LENGTH / 2) + vehicleRadius + 0.3;
                vehicleMesh.position.set(0, vehicleMesh.position.y, initialZ);
                vehicleMesh.rotation.y = 0;
            }

            // Remove Active Projectile if any
            if (activeProjectile) {
                scene.remove(activeProjectile.mesh);
                if (activeProjectile.mesh.geometry) activeProjectile.mesh.geometry.dispose();
                if (activeProjectile.mesh.material) activeProjectile.mesh.material.dispose();
                activeProjectile = null;
                if (cannonMesh) cannonMesh.visible = true;
            }

            startSequence();
        }

        function triggerGameOver() {
            gameActive = false;
            isGameOver = true;

            const finalScoreElem = document.getElementById('final-score');
            if (finalScoreElem) finalScoreElem.innerText = score;

            const goElem = document.getElementById('gameover-overlay');
            if (goElem) goElem.style.display = 'block';
        }

        // SCORE ENGINE --- You can change this to modify scoring rules and promote scoring strategies.
        function addScore(points) {
            score += points;
            const scoreElem = document.getElementById('score-text');
            if (scoreElem) {
                scoreElem.innerText = score;
            }
        }

        // The DARK GREY FLOOR. I wanted to make the dark grey carpet... but I think this works.
        function createFloor() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#222226';
            ctx.fillRect(0, 0, 512, 512);
            
            ctx.strokeStyle = '#33333b';
            ctx.lineWidth = 6;
            const tileSize = 64;
            for (let x = 0; x <= 512; x += tileSize) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 512); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, x); ctx.lineTo(512, x); ctx.stroke();
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(WIDTH / 2, LENGTH / 2);

            const floorMat = new THREE.MeshPhongMaterial({ map: texture, shininess: 10 });
            const floorGeo = new THREE.PlaneGeometry(WIDTH, LENGTH);
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);
        }

        // --- OUTWARD SILVER PERIMETER WALLS. Inspired by old faithful aluminum extrusion walls. I wanted to make them look like brushed aluminum, but I think this works.
        function createPerimeterWalls() {
            const wallMaterial = new THREE.MeshPhongMaterial({
                color: 0xe0e0e0,
                specular: 0xffffff,
                shininess: 80
            });

            const wallGroup = new THREE.Group();

            const nsGeo = new THREE.BoxGeometry(WIDTH + (WALL_THICKNESS * 2), WALL_HEIGHT, WALL_THICKNESS);
            const northWall = new THREE.Mesh(nsGeo, wallMaterial);
            northWall.position.set(0, WALL_HEIGHT / 2, (LENGTH / 2) + (WALL_THICKNESS / 2));

            const southWall = new THREE.Mesh(nsGeo, wallMaterial);
            southWall.position.set(0, WALL_HEIGHT / 2, -(LENGTH / 2) - (WALL_THICKNESS / 2));

            const ewGeo = new THREE.BoxGeometry(WALL_THICKNESS, WALL_HEIGHT, LENGTH);
            const eastWall = new THREE.Mesh(ewGeo, wallMaterial);
            eastWall.position.set((WIDTH / 2) + (WALL_THICKNESS / 2), WALL_HEIGHT / 2, 0);

            const westWall = new THREE.Mesh(ewGeo, wallMaterial);
            westWall.position.set(-(WIDTH / 2) - (WALL_THICKNESS / 2), WALL_HEIGHT / 2, 0);

            wallGroup.add(northWall, southWall, eastWall, westWall);
            wallGroup.children.forEach(w => { w.castShadow = true; w.receiveShadow = true; });
            scene.add(wallGroup);
        }

        // LOAD PREMADE VEHICLE MODEL: The vehicle will be loaded from file 'vehicle.glb'. This is a GLTF 3D model file.
        // I used a sample mechanum wheel robot model with an Arduino on top... LOL.
        // Vehicle model is just visuals. Does not affect physics or collision detection. The vehicle's bounding radius is calculated from the model's dimensions.
        function loadVehicleModel() {
            const loader = new THREE.GLTFLoader();

            loader.load(
                'vehicle.glb',
                function (gltf) {
                    vehicleMesh = gltf.scene;

                    const unscaledBox = new THREE.Box3().setFromObject(vehicleMesh);
                    const unscaledSize = new THREE.Vector3();
                    unscaledBox.getSize(unscaledSize);

                    const unscaledCenter = new THREE.Vector3();
                    unscaledBox.getCenter(unscaledCenter);

                    const targetWidth = 0.69;
                    vehicleScaleFactor = targetWidth / (unscaledSize.x > 0 ? unscaledSize.x : 1);
                    vehicleMesh.scale.set(vehicleScaleFactor, vehicleScaleFactor, vehicleScaleFactor);

                    const scaledWidth = unscaledSize.x * vehicleScaleFactor;
                    const scaledLength = unscaledSize.z * vehicleScaleFactor;

                    vehicleRadius = Math.hypot(scaledWidth, scaledLength) / 2;

                    const initialZ = -(LENGTH / 2) + vehicleRadius + 0.3;
                    vehicleMesh.position.x = 0;
                    vehicleMesh.position.z = initialZ;
                    vehicleMesh.position.y = -unscaledBox.min.y * vehicleScaleFactor;
                    vehicleMesh.rotation.y = 0;

                    vehicleMesh.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });

                    const worldCannonRadius = 0.33 / 8;
                    const worldCannonLength = scaledLength / 3;

                    const localCannonRadius = worldCannonRadius / vehicleScaleFactor;
                    const localCannonLength = worldCannonLength / vehicleScaleFactor;

                    cannonPivot = new THREE.Group();
                    cannonPivot.position.set(
                        unscaledCenter.x,
                        unscaledBox.max.y,
                        unscaledCenter.z
                    );

                    const cannonGeo = new THREE.CylinderGeometry(
                        localCannonRadius,
                        localCannonRadius,
                        localCannonLength,
                        32
                    );

                    cannonGeo.rotateX(Math.PI / 2);
                    cannonGeo.translate(0, 0, localCannonLength / 2);

                    const cannonMat = new THREE.MeshPhongMaterial({
                        color: 0xffff00,
                        shininess: 60
                    });

                    cannonMesh = new THREE.Mesh(cannonGeo, cannonMat);
                    cannonMesh.castShadow = true;
                    cannonMesh.receiveShadow = true;

                    cannonPivot.add(cannonMesh);
                    vehicleMesh.add(cannonPivot);

                    scene.add(vehicleMesh);
                },
                undefined,
                function (error) {
                    console.warn("Could not load 'vehicle.glb'. Ensure file is served via local web server.", error);
                }
            );
        }

        // FIRE CANNON PROJECTILE!! ;)
        function fireCannon() {
            if (!gameActive || isGameOver || activeProjectile || !cannonMesh || !cannonPivot || !cannonMesh.visible) return;

            playCannonSound();

            cannonMesh.visible = false;

            const worldPos = new THREE.Vector3();
            cannonPivot.getWorldPosition(worldPos);

            const worldQuaternion = new THREE.Quaternion();
            cannonPivot.getWorldQuaternion(worldQuaternion);

            const launchDir = new THREE.Vector3(0, 0, 1).applyQuaternion(worldQuaternion).normalize();

            const worldRadius = 0.33 / 8;
            const worldLength = (vehicleRadius * 2) / 3;

            const projGeo = new THREE.CylinderGeometry(worldRadius, worldRadius, worldLength, 32);
            projGeo.rotateX(Math.PI / 2);
            projGeo.translate(0, 0, worldLength / 2);

            const projMat = new THREE.MeshPhongMaterial({
                color: 0xffff00,
                shininess: 60
            });

            const projMesh = new THREE.Mesh(projGeo, projMat);
            projMesh.position.copy(worldPos);
            projMesh.quaternion.copy(worldQuaternion);
            projMesh.castShadow = true;
            projMesh.receiveShadow = true;

            scene.add(projMesh);

            activeProjectile = {
                mesh: projMesh,
                velocity: launchDir.multiplyScalar(LAUNCH_SPEED),
                radius: worldRadius,
                length: worldLength
            };
        }

        // This is the CANNON ELEVATION CONTROL ---
        function updateCannon(delta) {
            if (!cannonPivot) return;

            if (keys.i) {
                cannonAngle += CANNON_SPEED * delta;
            }
            if (keys.k) {
                cannonAngle -= CANNON_SPEED * delta;
            }

            cannonAngle = Math.min(MAX_CANNON_ANGLE, Math.max(MIN_CANNON_ANGLE, cannonAngle));
            cannonPivot.rotation.x = -cannonAngle;
        }

        // Here comes the so very EXCITING PARTICLE EXPLOSION EFFECT!!
        function createExplosion(pos) {
            playExplosionSound();

            const particleCount = 90;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const velocities = [];

            const colorPalette = [
                new THREE.Color(0xffffff),
                new THREE.Color(0xffea00),
                new THREE.Color(0xff6600),
                new THREE.Color(0xee2200)
            ];

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = pos.x;
                positions[i * 3 + 1] = pos.y;
                positions[i * 3 + 2] = pos.z;

                const u = Math.random();
                const v = Math.random();
                const theta = u * 2.0 * Math.PI;
                const phi = Math.acos(2.0 * v - 1.0);
                const speed = THREE.MathUtils.randFloat(3.5, 9.0);

                velocities.push(new THREE.Vector3(
                    speed * Math.sin(phi) * Math.cos(theta),
                    speed * Math.sin(phi) * Math.sin(theta) + THREE.MathUtils.randFloat(1.5, 4.0),
                    speed * Math.cos(phi)
                ));

                const col = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[i * 3] = col.r;
                colors[i * 3 + 1] = col.g;
                colors[i * 3 + 2] = col.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.18,
                vertexColors: true,
                transparent: true,
                opacity: 1.0,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            const pSystem = new THREE.Points(geometry, material);
            scene.add(pSystem);

            const flashLight = new THREE.PointLight(0xff7700, 6.0, 8.0);
            flashLight.position.copy(pos);
            scene.add(flashLight);

            activeExplosions.push({
                mesh: pSystem,
                light: flashLight,
                velocities: velocities,
                life: 0.8,
                maxLife: 0.8
            });
        }

        // UPDATE EXPLOSION PARTICLES & LIGHTS
        function updateExplosions(delta) {
            for (let e = activeExplosions.length - 1; e >= 0; e--) {
                const exp = activeExplosions[e];
                exp.life -= delta;

                if (exp.life <= 0) {
                    scene.remove(exp.mesh);
                    if (exp.mesh.geometry) exp.mesh.geometry.dispose();
                    if (exp.mesh.material) exp.mesh.material.dispose();

                    if (exp.light) scene.remove(exp.light);
                    activeExplosions.splice(e, 1);
                    continue;
                }

                const lifeFactor = exp.life / exp.maxLife;

                if (exp.light) {
                    exp.light.intensity = lifeFactor * 6.0;
                }

                exp.mesh.material.opacity = lifeFactor;

                const posArr = exp.mesh.geometry.attributes.position.array;
                for (let i = 0; i < exp.velocities.length; i++) {
                    const vel = exp.velocities[i];

                    vel.y -= GRAVITY * 1.2 * delta;
                    vel.multiplyScalar(0.96);

                    posArr[i * 3]     += vel.x * delta;
                    posArr[i * 3 + 1] += vel.y * delta;
                    posArr[i * 3 + 2] += vel.z * delta;

                    if (posArr[i * 3 + 1] < 0.02) {
                        posArr[i * 3 + 1] = 0.02;
                        vel.y = -vel.y * 0.3;
                    }
                }
                exp.mesh.geometry.attributes.position.needsUpdate = true;
            }
        }

        // CHECK CLEAR FIELD & RESPAWN IMMEDIATELY (new object set)
        function checkFieldCleared() {
            if (activeObstacles.length === 0 && gameActive) {
                // Reset timer immediately on clearing both objects, NO bar removed
                timerSeconds = 10.0;
                spawnObstacles();
            }
        }

        // UPDATE BALLISTIC PROJECTILE PHYSICS
        function updateProjectile(delta) {
            if (!activeProjectile) return;

            activeProjectile.velocity.y -= GRAVITY * delta;
            activeProjectile.mesh.position.addScaledVector(activeProjectile.velocity, delta);

            if (activeProjectile.velocity.lengthSq() > 0.001) {
                const lookDir = activeProjectile.velocity.clone().normalize();
                activeProjectile.mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), lookDir);
            }

            const pos = activeProjectile.mesh.position;
            let hit = false;

            if (pos.y <= activeProjectile.radius) {
                hit = true;
            }

            if (!hit) {
                for (let i = activeObstacles.length - 1; i >= 0; i--) {
                    const obs = activeObstacles[i];
                    if (obs.material && obs.material.color.getHex() === 0xEE2222) {
                        const obsRadius = obs.userData.radius || 0.5;
                        const obsHeight = obs.geometry.parameters.height || 1.0;

                        const dx = pos.x - obs.position.x;
                        const dy = pos.y - (obs.position.y);
                        const dz = pos.z - obs.position.z;
                        const distXZ = Math.hypot(dx, dz);

                        if (distXZ < (activeProjectile.radius + obsRadius) && Math.abs(dy) < (obsHeight / 2 + activeProjectile.radius)) {
                            hit = true;
                            addScore(10);
                            createExplosion(obs.position.clone());

                            scene.remove(obs);
                            if (obs.geometry) obs.geometry.dispose();
                            if (obs.material) obs.material.dispose();
                            activeObstacles.splice(i, 1);

                            checkFieldCleared();
                            break;
                        }
                    }
                }
            }

            if (Math.abs(pos.x) > WIDTH / 2 + 1.0 || Math.abs(pos.z) > LENGTH / 2 + 1.0) {
                hit = true;
            }

            if (hit) {
                scene.remove(activeProjectile.mesh);
                if (activeProjectile.mesh.geometry) activeProjectile.mesh.geometry.dispose();
                if (activeProjectile.mesh.material) activeProjectile.mesh.material.dispose();
                activeProjectile = null;

                if (cannonMesh) {
                    cannonMesh.visible = true;
                }
            }
        }

        // VEHICLE MOVEMENT & COLLISION ENGINE. Do not expect super realistic collisions or careful bounding box calculations. This is a simple arcade-style collision detection and response system.
        function updateVehicle(delta) {
            if (!vehicleMesh || !gameActive || isGameOver) return;

            if (keys.j) vehicleMesh.rotation.y += ROTATION_SPEED * delta;
            if (keys.l) vehicleMesh.rotation.y -= ROTATION_SPEED * delta;

            let dirX = 0, dirZ = 0;
            if (keys.w) dirZ += 1;
            if (keys.s) dirZ -= 1;
            if (keys.a) dirX += 1;
            if (keys.d) dirX -= 1;

            let targetVx = 0, targetVz = 0;
            const inputLen = Math.hypot(dirX, dirZ);

            if (inputLen > 0) {
                targetVx = (dirX / inputLen) * MAX_SPEED;
                targetVz = (dirZ / inputLen) * MAX_SPEED;
            }

            const diffX = targetVx - vx;
            const diffZ = targetVz - vz;
            const distVel = Math.hypot(diffX, diffZ);
            const step = ACCELERATION * delta;

            if (distVel <= step) {
                vx = targetVx;
                vz = targetVz;
            } else {
                vx += (diffX / distVel) * step;
                vz += (diffZ / distVel) * step;
            }

            vehicleMesh.position.x += vx * delta;
            vehicleMesh.position.z += vz * delta;

            activeObstacles.slice().forEach(obs => {
                const obsRadius = obs.userData.radius || 0.5;
                const dx = vehicleMesh.position.x - obs.position.x;
                const dz = vehicleMesh.position.z - obs.position.z;
                const dist = Math.hypot(dx, dz);
                const minDist = vehicleRadius + obsRadius;

                if (dist < minDist && dist > 0) {
                    if (obs.material && obs.material.color.getHex() === 0x2266FF && !obs.userData.hit) {
                        obs.userData.hit = true;
                        playScoreSound();
                        addScore(20);

                        scene.remove(obs);
                        if (obs.geometry) obs.geometry.dispose();
                        if (obs.material) obs.material.dispose();
                        const idx = activeObstacles.indexOf(obs);
                        if (idx !== -1) activeObstacles.splice(idx, 1);

                        checkFieldCleared();
                        return;
                    }

                    const overlap = minDist - dist;
                    const nx = dx / dist;
                    const nz = dz / dist;

                    vehicleMesh.position.x += nx * overlap;
                    vehicleMesh.position.z += nz * overlap;

                    const dot = vx * nx + vz * nz;
                    if (dot < 0) {
                        vx -= dot * nx;
                        vz -= dot * nz;
                    }
                }
            });

            const maxX = (WIDTH / 2) - vehicleRadius;
            const maxZ = (LENGTH / 2) - vehicleRadius;

            if (vehicleMesh.position.x > maxX) {
                vehicleMesh.position.x = maxX;
                vx = 0;
            } else if (vehicleMesh.position.x < -maxX) {
                vehicleMesh.position.x = -maxX;
                vx = 0;
            }

            if (vehicleMesh.position.z > maxZ) {
                vehicleMesh.position.z = maxZ;
                vz = 0;
            } else if (vehicleMesh.position.z < -maxZ) {
                vehicleMesh.position.z = -maxZ;
                vz = 0;
            }

            updateCannon(delta);
        }

        // -UPDATE TOP HUD -
        function updateHUD() {
            const cannonDeg = (cannonAngle * 180 / Math.PI).toFixed(1);
            const cannonElem = document.getElementById('cannon-text');
            if (cannonElem) {
                cannonElem.innerText = cannonDeg + '°';
            }

            const canvas = document.getElementById('dial-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const r = 20;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.strokeStyle = '#334466';
            ctx.lineWidth = 3;
            ctx.stroke();

            if (keys.j || keys.l) {
                ctx.beginPath();
                if (keys.j) {
                    ctx.arc(cx, cy, r, -Math.PI * 0.5, -Math.PI, true);
                } else {
                    ctx.arc(cx, cy, r, -Math.PI * 0.5, 0, false);
                }
                ctx.strokeStyle = '#00E5FF';
                ctx.lineWidth = 5;
                ctx.stroke();
            }

            const speed = Math.hypot(vx, vz);
            if (speed > 0.05) {
                const moveAngle = Math.atan2(-vz, -vx);
                ctx.beginPath();
                ctx.arc(cx, cy, r, moveAngle - 0.35, moveAngle + 0.35);
                ctx.strokeStyle = '#4CAF50';
                ctx.lineWidth = 5;
                ctx.stroke();
            }

            let rotY = 0;
            if (vehicleMesh) {
                rotY = vehicleMesh.rotation.y;
            }
            const headingAngle = Math.atan2(-Math.cos(rotY), -Math.sin(rotY));

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(headingAngle);

            const needleLen = 14;
            const needleBase = 6;

            ctx.beginPath();
            ctx.moveTo(needleLen, 0);                 
            ctx.lineTo(-needleBase, -needleBase);     
            ctx.lineTo(-needleBase / 2, 0);           
            ctx.lineTo(-needleBase, needleBase);      
            ctx.closePath();

            ctx.fillStyle = '#FF3D00';
            ctx.fill();
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(0, 0, 2.5, 0, Math.PI * 2);
            ctx.fillStyle = '#FFFFFF';
            ctx.fill();

            ctx.restore();
        }

        // OBSTACLE GENERATION & BOUNDS CHECK... we dont want obstacles too close to the vehicle or overlapping each other. This function will spawn a new set of obstacles in random positions and shapes.
        function spawnObstacles() {
            activeObstacles.forEach(obs => {
                scene.remove(obs);
                if (obs.geometry) obs.geometry.dispose();
                if (obs.material) obs.material.dispose();
            });
            activeObstacles = [];

            const shapes = ['prism', 'cylinder', 'wall'];
            const obstacleColors = [0xEE2222, 0x2266FF];

            obstacleColors.forEach(color => {
                const shape = shapes[Math.floor(Math.random() * shapes.length)];
                const height = THREE.MathUtils.randFloat(0.6, 1.8);
                const footprint = THREE.MathUtils.randFloat(MIN_FOOTPRINT, MAX_FOOTPRINT);

                let geometry;
                let boundingRadius = footprint / 2;

                if (shape === 'prism') {
                    geometry = new THREE.CylinderGeometry(footprint / 2, footprint / 2, height, 3);
                } else if (shape === 'cylinder') {
                    geometry = new THREE.CylinderGeometry(footprint / 2, footprint / 2, height, 32);
                } else {
                    const wallDepth = 0.25;
                    geometry = new THREE.BoxGeometry(footprint, height, wallDepth);
                    boundingRadius = Math.hypot(footprint / 2, wallDepth / 2);
                }

                const material = new THREE.MeshPhongMaterial({
                    color: color,
                    shininess: 40
                });

                const obstacle = new THREE.Mesh(geometry, material);
                obstacle.userData = { radius: boundingRadius };

                const maxX = (WIDTH / 2) - boundingRadius;
                const maxZ = (LENGTH / 2) - boundingRadius;

                let validPos = false;
                let attempts = 0;
                let posX = 0, posZ = 0;

                while (!validPos && attempts < 100) {
                    attempts++;
                    posX = THREE.MathUtils.randFloat(-maxX, maxX);
                    posZ = THREE.MathUtils.randFloat(-maxZ, maxZ);

                    let distToVehicle = 999;
                    if (vehicleMesh) {
                        distToVehicle = Math.hypot(posX - vehicleMesh.position.x, posZ - vehicleMesh.position.z);
                    }

                    let distToOtherObs = 999;
                    activeObstacles.forEach(existing => {
                        const d = Math.hypot(posX - existing.position.x, posZ - existing.position.z);
                        distToOtherObs = Math.min(distToOtherObs, d);
                    });

                    if (distToVehicle > (boundingRadius + vehicleRadius + 1.2) && distToOtherObs > (boundingRadius + 0.8)) {
                        validPos = true;
                    }
                }

                obstacle.position.x = posX;
                obstacle.position.z = posZ;
                obstacle.position.y = height / 2;
                obstacle.rotation.y = Math.random() * Math.PI;

                obstacle.castShadow = true;
                obstacle.receiveShadow = true;

                scene.add(obstacle);
                activeObstacles.push(obstacle);
            });
        }

        // TTIMER UPDATE LOOP & BAR DECAY
        function updateTimer(delta) {
            if (!gameActive || isGameOver) return;

            timerSeconds -= delta;

            if (timerSeconds <= 0) {
                remainingBars--;
                updateBarsHUD();
                playBarLostSound();

                if (remainingBars <= 0) {
                    triggerGameOver();
                } else {
                    timerSeconds = 10.0;
                    spawnObstacles();
                }
            }

            const timerText = document.getElementById('timer-text');
            if (timerText) {
                timerText.innerText = Math.max(0, timerSeconds).toFixed(1);
            }
        }

        // You can switch POV positions to simulate different positions along the driver area.
        // CAMERA POV SWITCHING. Kind of cumbersome, but I wanted to give the player a choice of camera angles.
        // When I port this to a VR viewer version or into an Oculus, I will have to rethink the camera system and controls. For now, this is a simple POV switcher.
        function setPOV(index) {
            const pov = povPositions[index];
            if (!pov) return;

            camera.position.set(pov.x, pov.y, pov.z);
            camera.lookAt(pov.x, 0.1, 1.0);

            document.getElementById('current-view').innerText = pov.name;
        }

        //KEYBOARD EVENT HANDLERS
        function onKeyDown(event) {
            if (!sequenceStarted && !isGameOver) {
                startSequence();
            }

            if (event.ctrlKey) {
                if (event.key === '1') { event.preventDefault(); setPOV(3); }
                else if (event.key === '2') { event.preventDefault(); setPOV(2); }
                else if (event.key === '3') { event.preventDefault(); setPOV(1); }
                return;
            }

            if (event.code === 'Space' || event.key === ' ') {
                event.preventDefault();
                fireCannon();
                return;
            }

            const k = event.key.toLowerCase();
            if (k in keys) {
                keys[k] = true;
            }
        }

        function onKeyUp(event) {
            const k = event.key.toLowerCase();
            if (k in keys) {
                keys[k] = false;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function toggleFullScreen() {
            initAudio();
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            const delta = Math.min((now - lastTime) / 1000, 0.1);
            lastTime = now;

            updateTimer(delta);
            updateVehicle(delta);
            updateProjectile(delta);
            updateExplosions(delta);
            updateHUD();

            renderer.render(scene, camera);
        }
    </script>
</body>
